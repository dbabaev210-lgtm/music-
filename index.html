<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Музыка ВК</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 700px; margin: 20px auto; padding: 10px; background: #f5f5f5; }
        button, input { padding: 12px; margin: 8px 0; font-size: 16px; width: 100%; box-sizing: border-box; }
        #auth-block, #player-block { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        ul { list-style: none; padding: 0; }
        li { cursor: pointer; padding: 10px; border-bottom: 1px solid #eee; }
        li:hover { background: #f0f0f0; }
        .playing { background: #e3f2fd; font-weight: bold; }
        audio { width: 100%; margin: 10px 0; }
        #search { width: 100%; }
        .error { color: red; margin: 10px 0; }
    </style>
</head>
<body>
    <div id="auth-block">
        <h2>🎵 Музыка ВКонтакте</h2>
        <p>Нажми кнопку, чтобы войти через ВК и слушать музыку.</p>
        <button id="login-btn">Войти через ВК</button>
        <div id="error-msg" class="error"></div>
    </div>

    <div id="player-block" class="hidden">
        <h2>Мой плеер</h2>
        <input type="text" id="search" placeholder="Поиск...">
        <button id="search-btn">Найти</button>
        <audio id="audio" controls></audio>
        <div id="now-playing"></div>
        <h3>Мои аудиозаписи</h3>
        <ul id="track-list"></ul>
        <button id="logout-btn">Выйти</button>
    </div>

    <script>
        const CLIENT_ID = '6287487';
        const REDIRECT_URI = window.location.origin + window.location.pathname;
        const API_VERSION = '5.131';

        let accessToken = localStorage.getItem('vk_token');
        let tracks = [];
        let currentTrack = -1;

        // DOM
        const authBlock = document.getElementById('auth-block');
        const playerBlock = document.getElementById('player-block');
        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const audio = document.getElementById('audio');
        const trackList = document.getElementById('track-list');
        const searchInput = document.getElementById('search');
        const searchBtn = document.getElementById('search-btn');
        const nowPlaying = document.getElementById('now-playing');
        const errorMsg = document.getElementById('error-msg');

        function showError(text) {
            errorMsg.textContent = text;
            errorMsg.classList.remove('hidden');
        }
        function hideError() { errorMsg.classList.add('hidden'); }

        // Если есть сохранённый токен – сразу в плеер
        if (accessToken) {
            authBlock.classList.add('hidden');
            playerBlock.classList.remove('hidden');
            loadAudios();
        }

        // ---------- PKCE авторизация (plain метод) ----------
        function generateRandomString(length) {
            const arr = new Uint8Array(length);
            crypto.getRandomValues(arr);
            return Array.from(arr, b => ('0' + b.toString(16)).slice(-2)).join('');
        }

        loginBtn.addEventListener('click', () => {
            hideError();
            const codeVerifier = generateRandomString(64);
            localStorage.setItem('code_verifier', codeVerifier);
            // Для plain метода code_challenge = code_verifier
            const codeChallenge = codeVerifier;

            const authUrl = `https://oauth.vk.com/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=audio&response_type=code&code_challenge=${codeChallenge}&code_challenge_method=plain&v=${API_VERSION}&state=random`;
            window.location.href = authUrl;
        });

        // Обработка code после редиректа
        async function handlePKCECallback() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            if (code) {
                const codeVerifier = localStorage.getItem('code_verifier');
                if (!codeVerifier) {
                    showError('Ошибка авторизации. Попробуйте ещё раз.');
                    return;
                }
                try {
                    const response = await fetch('https://oauth.vk.com/access_token', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: new URLSearchParams({
                            client_id: CLIENT_ID,
                            code: code,
                            code_verifier: codeVerifier,
                            redirect_uri: REDIRECT_URI,
                            grant_type: 'authorization_code'
                        })
                    });
                    const data = await response.json();
                    if (data.access_token) {
                        accessToken = data.access_token;
                        localStorage.setItem('vk_token', accessToken);
                        localStorage.removeItem('code_verifier');
                        // Очищаем URL
                        window.history.replaceState({}, document.title, REDIRECT_URI);
                        authBlock.classList.add('hidden');
                        playerBlock.classList.remove('hidden');
                        loadAudios();
                    } else {
                        showError('Ошибка получения токена: ' + JSON.stringify(data));
                    }
                } catch (e) {
                    showError('Сетевая ошибка: ' + e.message);
                }
            }
        }

        // Выход
        logoutBtn.addEventListener('click', () => {
            localStorage.removeItem('vk_token');
            accessToken = null;
            tracks = [];
            trackList.innerHTML = '';
            audio.src = '';
            authBlock.classList.remove('hidden');
            playerBlock.classList.add('hidden');
        });

        // Запрос к API
        async function apiCall(method, params) {
            params.access_token = accessToken;
            params.v = API_VERSION;
            const query = new URLSearchParams(params).toString();
            const resp = await fetch(`https://api.vk.com/method/${method}?${query}`);
            const data = await resp.json();
            if (data.error) {
                if (data.error.error_code === 5) {
                    localStorage.removeItem('vk_token');
                    accessToken = null;
                    authBlock.classList.remove('hidden');
                    playerBlock.classList.add('hidden');
                    showError('Сессия истекла. Войдите заново.');
                } else {
                    showError(`Ошибка: ${data.error.error_msg}`);
                }
                return null;
            }
            return data.response;
        }

        async function loadAudios() {
            const resp = await apiCall('audio.get', { count: 100 });
            if (!resp) return;
            tracks = resp.items || [];
            renderTracks();
        }

        async function searchTracks(q) {
            const resp = await apiCall('audio.search', { q, count: 50 });
            if (!resp) return;
            tracks = resp.items || [];
            renderTracks();
        }

        function renderTracks() {
            trackList.innerHTML = '';
            if (tracks.length === 0) {
                trackList.innerHTML = '<li>Ничего не найдено</li>';
                return;
            }
            tracks.forEach((t, i) => {
                const li = document.createElement('li');
                li.innerHTML = `${t.artist} — ${t.title}`;
                li.addEventListener('click', () => play(i));
                if (i === currentTrack) li.classList.add('playing');
                trackList.appendChild(li);
            });
        }

        function play(i) {
            if (!tracks[i]?.url) return;
            currentTrack = i;
            audio.src = tracks[i].url;
            audio.play();
            nowPlaying.textContent = `${tracks[i].artist} — ${tracks[i].title}`;
            renderTracks();
        }

        audio.addEventListener('ended', () => {
            if (currentTrack < tracks.length - 1) play(currentTrack + 1);
        });

        searchBtn.addEventListener('click', () => {
            const q = searchInput.value.trim();
            if (q) searchTracks(q);
        });

        // Вызов обработчика PKCE при загрузке страницы
        handlePKCECallback();
    </script>
</body>
</html>
